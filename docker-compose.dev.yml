# Solo para desarrollo local: PostgreSQL + MinIO (objetos S3-compatible).
# La API y el cliente se ejecutan en tu máquina (php artisan serve, pnpm dev).
# Uso: docker compose -f clientCooperative/docker-compose.dev.yml up -d
# Imagen MinIO: MINIO_IMAGE (por defecto RELEASE.2025-04-22T22-12-26Z).

services:
  postgres:
    image: postgres:16-alpine
    container_name: cooperative_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cooperative}
      POSTGRES_USER: ${DB_USERNAME:-cooperative}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    container_name: cooperative_minio_dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data_dev:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

volumes:
  postgres_data_dev:
  minio_data_dev:
